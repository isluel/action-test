name: docker-push
on:
  pull_request:
    branchs: [dev]

jobs:
  maven-packing:
    runs-on: ubuntu-latest
    steps:
    - name: chekcout
      uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21' # 버전
        distribution: 'temurin' # 배포판
        server-id: github 
        settings-path: ${{ github.workspace }}
    - name: Maven packaging
      run: |
        cd seat_reserve
        mvn -B package --file pom.xml

  docdker-push:
    runs-on: ubuntu-latest
    needs: [maven-packing]
    permissions:
      id-token: write
      contents: read
    steps:
    - name: checkout
      uses: actions/checkout@v4
    - name: Login docker
      uses: docker/login-action@v1
      with:
        username: ${{ secrets.DOCKER_ID }}
        password: ${{ secrets.DOCKER_PW }}
    - name: Build Docker Image
      run: docker build . --file Dockerfile --tag isluel/seat_reserve:${{ github.sha }}
    - name: Push Docker Image
      run: docker push isluel/seat_reserve:${{ github.sha }}