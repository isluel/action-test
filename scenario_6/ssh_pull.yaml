name: ssh-pusll
on:
  pull_request:
    branchs: [dev]

jobs:
  maven-packing:
    runs-on: ubuntu-latest
    steps:
    - name: checkout
      uses: actions/checkout@v4
    - name: Set Up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: 21 # Java Version
        distribution: 'temurin' # 배포판
        server-id: github 
        settings-path: ${{ github.workspace }}
    - name: Maven Packing
      run: |
        cd seat_reserve
        mvn -B package --file pom.xml

  docker-push:
    runs-on: ubuntu-latest
    needs: [maven-packing]
    permissions:
      id-token: write
      contents: read
    steps:
    - name: checkout
      uses: actions/checkout@v4
    - name: Login Docker
      uses: docker/login-action@v1
      with:
        username: ${{ secrets.DOCKER_ID }}
        password: ${{ secrets.DOCKER_PW }}
    - name: Build Docker Image
      run: |
        docker build . --file ./scenario_2/Dockerfile --tag isluel/seat_reserve:${{ github.sha }}
    - name:
      run: |
        docker push isluel/seat_reserve:${{ github.sha }}
  
  ssh-pull:
    runs-on: ubuntu-latest
    needs: [docker-push]
    steps:
    - name: docker stop
      uses: appleboy/ssh-action@v1.2.2
      with:
        host: ${{ secrets.REMOTE_SSH_HOST }}
        username: ${{ secrets.REMOTE_SSH_USERNAME }}
        password: ${{ secrets.REMOTE_SSH_PASSWORD}}
        port: ${{ secrets.REMOTE_SSH_PORT }}
        script: |
          docker stop seat_reserve
          docker rm seat_reserve
          docker rmi $(docker images -q --filter 'reference=isluel/seat_reserve')
    - name: docker pull
      uses: appleboy/ssh-action@v1.2.2
      if: always()
      with:
        host: ${{ secrets.REMOTE_SSH_HOST }}
        username: ${{ secrets.REMOTE_SSH_USERNAME }}
        password: ${{ secrets.REMOTE_SSH_PASSWORD}}
        port: ${{ secrets.REMOTE_SSH_PORT }}
        script: |
          docker pull isluel/seat_reserve:${{ github.sha }}
    - name: docker run
      uses: appleboy/ssh-action@v1.2.2
      if: always()
      with:
        host: ${{ secrets.REMOTE_SSH_HOST }}
        username: ${{ secrets.REMOTE_SSH_USERNAME }}
        password: ${{ secrets.REMOTE_SSH_PASSWORD}}
        port: ${{ secrets.REMOTE_SSH_PORT }}
        script: |
          docker run -d -p 8098:8098 -e "JAVA_OPTS=-Dspring.datasource.url=jdbc:mysql://host.docker.internal:3306/seat_reserve?useSSL=false&useUnicode=true&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true -Dspring.data.redis.host=host.docker.internal" --name seat_reserve isluel/seat_reserve